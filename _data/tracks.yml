new-to-ai:
  title: "New to AI"
  url: "/start-here/new-to-ai"
  tagline: "Never used AI tools in research before."
  next_track: "casual-user"
  framing: "New to these tools? Start here. You don’t need to be a programmer, and you don’t need to overhaul how you work. Get a working setup, get one real result, and build from there."
  path:
    - title: "Getting Started with Claude Code"
      url: "/pipeline/01-setup"
      why: "Install it and run your first productive session."
    - title: "From an Empty Folder to a Figure"
      url: "/pipeline/02-data-analysis"
      why: "Take a question all the way to a publication-quality figure."
  closing_before: "Once those feel natural, "
  closing_after: " covers the rest."

casual-user:
  title: "Casual User"
  url: "/start-here/casual-user"
  tagline: "You’ve used ChatGPT or similar and want to go deeper."
  next_track: "power-user"
  framing: "You already use AI for bits and pieces. The gap is seeing what changes when you point it at real research work instead of a chat window. Pick the task closest to what you do."
  path:
    - title: "From EDGAR Filings to a Structured Database"
      url: "/pipeline/03-scraping"
      why: "Scraping filings to build datasets for new research lines."
    - title: "Large Datasets and Structured Databases"
      url: "/pipeline/04-large-data"
      why: "Leveraging Claude to turn unwieldy big data into a queryable database."
    - title: "Writing and Thinking with AI Assistance"
      url: "/pipeline/05-writing"
      why: "Enhance your writing with Claude while keeping your own voice."
  further_reading:
    - title: "AI and the Research O-Ring"
      url: "https://paulgp.substack.com/p/ai-and-the-research-o-ring"
      why: "Why it’s worth going deeper."

power-user:
  title: "Power User"
  url: "/start-here/power-user"
  tagline: "Already comfortable, looking for advanced techniques."
  framing: "You already run agents in your workflow. This track is the frontier: standardizing what the agent does, controlling the environment it runs in, and verifying what it produces."
  path:
    - title: "Skills: Specifying How an Agent Should Think"
      url: "/pipeline/06-skills"
      why: "Standardize your workflows with reusable Claude skills."
    - title: "Permissions, Sandboxes, and Autonomous Agents"
      url: "/pipeline/07-permissions"
      why: "Defining the environment an agentic AI works in."
    - title: "Integration and Collaboration"
      url: "/pipeline/08-workflow-git"
      why: "What to do after the agent hands you a finished-looking result."
    - title: "Restricted Data"
      url: "/restricted-data"
      why: "Working with data an agent can’t touch: RDCs, credit-bureau, PII."
  further_reading:
    - title: "llms.txt for Academic Papers"
      url: "https://paulgp.com/2026/03/10/llms-txt-for-academic-papers.html"
      why: "Make your papers machine-readable for AI tools."
    - title: "AI One-Shot Papers"
      url: "https://paulgp.com/2026/03/21/ai-oneshot-papers.html"
      why: "How far one-shot generation can and can’t go."
