01-setup:
  title: "Getting Started with Claude Code"
  youtube_id: "HzgByl5ZsWE"
  duration: "36:31"
  description: ""
  substack_url: "https://paulgp.substack.com/p/getting-started-with-claude-code"
  takeaways:
    - "Start with a clear subscription choice: Pro ($20/month) for light use, Max ($100/month) for daily coding, since the context window and rate limits determine how far each session goes"
    - "Set up a proper terminal (Ghostty or iTerm2, Zellij for multiplexing, Oh My Zsh) so you can run Claude Code alongside your editor and shell"
    - "Understand the context window: Claude holds roughly 200,000 tokens, auto-compacts when full, and sessions work best within 5 to 10 turns before starting fresh"
    - "Be specific in your prompts and correct early when Claude drifts, rather than letting mistakes compound across turns"
    - "Trust but verify: let Claude write the code, but always check research-critical output yourself"
  resources:
    - title: "Claude Code documentation"
      url: "https://docs.anthropic.com/en/docs/claude-code"
    - title: "Ghostty terminal"
      url: "https://ghostty.org/"
    - title: "Zellij terminal multiplexer"
      url: "https://zellij.dev/"
    - title: "Oh My Zsh"
      url: "https://ohmyz.sh/"

02-data-analysis:
  title: "From an Empty Folder to a Figure"
  youtube_id: "Rp17XUPxa4I"
  duration: "37:30"
  description: ""
  substack_url: "https://paulgp.substack.com/p/from-an-empty-folder-to-a-figure"
  takeaways:
    - "Let Claude handle data acquisition: point it at the source (Census, FRED) and let it navigate the download, rather than spending 20 minutes finding the right table yourself"
    - "Reference style guides you like (such as Kieran Healy's data visualization work) instead of specifying individual plot parameters one at a time"
    - "Iterate in small steps rather than writing one comprehensive specification; refine the figure incrementally"
    - "Always generate scripts, not just outputs: the code is the reproducible artifact, not the chart"
    - "The judgment is still yours: Claude accelerates implementation, but choosing what to plot and how to interpret it remains your job"
  resources:
    - title: "Kieran Healy, Data Visualization (book)"
      url: "https://socviz.co/"
    - title: "Census Bureau Housing Vacancies Survey"
      url: "https://www.census.gov/housing/hvs/"

03-scraping:
  title: "From EDGAR Filings to a Structured Database"
  youtube_id: "wqLZrKdevHs"
  duration: "27:46"
  description: ""
  substack_url: "https://paulgp.substack.com/p/from-edgar-filings-to-a-structured"
  takeaways:
    - "Front-load context for scraping tasks: tell Claude about rate limits, API structure, and expected response formats before it starts writing code"
    - "Let Claude ask you questions about design decisions rather than specifying everything upfront; the interactive back-and-forth produces better architecture"
    - "Build or approve the database schema yourself, and use DuckDB or SQLite for research-scale projects where a full database server is overkill"
    - "Build resume capability into network-dependent pipelines so a dropped connection doesn't mean starting over"
    - "Add quality reports that run after each stage; they catch parsing failures early (in this case, surfacing that 1 of 120 filings failed)"
    - "Run a real descriptive analysis on the output: if the finding makes sense (tariff mentions rising in the expected years), it validates the whole pipeline"
  resources:
    - title: "SEC EDGAR Full-Text Search"
      url: "https://efts.sec.gov/LATEST/"
    - title: "DuckDB: In-process analytical database"
      url: "https://duckdb.org/"
    - title: "Economic Policy Uncertainty Index"
      url: "https://www.policyuncertainty.com/"

04-large-data:
  title: "Large Datasets and Structured Databases"
  youtube_id: "4uwI1-9DafU"
  duration: "55:30"
  description: ""
  substack_url: "https://paulgp.substack.com/p/large-datasets-and-structured-databases"
  takeaways:
    - "Use DuckDB and Parquet instead of CSVs and dataframes when data doesn't fit in RAM, with lazy-loading and fast aggregation"
    - "Build metadata tables as 'context engineering for data': store schema, descriptions, and value labels inside the database so it documents itself across sessions"
    - "Use plan mode before writing code, so Claude designs the pipeline architecture and creates a persistent reference rather than jumping into premature edits"
    - "Ask what's feasible first. Inquire about obstacles and missing information before directing Claude to complete a task"
    - "Deploy parallel sub-agents for research tasks, but verify they inherit your constraints, since they write their own sub-prompts"
    - "The fixed cost of proper data engineering has collapsed: large administrative datasets (HMDA, Medicare claims, patent filings) are more accessible than the tooling barriers suggest"
  resources:
    - title: "HMDA Data (Consumer Financial Protection Bureau)"
      url: "https://www.consumerfinance.gov/data-research/hmda/"
    - title: "DuckDB: In-process analytical database"
      url: "https://duckdb.org/"
    - title: "IPEDS Database (example project)"
      url: "https://github.com/paulgp/ipeds-database"

