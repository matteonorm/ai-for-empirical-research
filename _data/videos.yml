04-large-data:
  title: "Large Datasets and Structured Databases"
  youtube_id: "4uwI1-9DafU"
  duration: "55:30"
  description: ""
  substack_url: "https://paulgp.substack.com/p/large-datasets-and-structured-databases"
  takeaways:
    - "Use DuckDB and Parquet instead of CSVs and dataframes when data doesn't fit in RAM, with lazy-loading and fast aggregation"
    - "Build metadata tables as 'context engineering for data': store schema, descriptions, and value labels inside the database so it documents itself across sessions"
    - "Use plan mode before writing code, so Claude designs the pipeline architecture and creates a persistent reference rather than jumping into premature edits"
    - "Ask what's feasible first. Inquire about obstacles and missing information before directing Claude to complete a task"
    - "Deploy parallel sub-agents for research tasks, but verify they inherit your constraints, since they write their own sub-prompts"
    - "The fixed cost of proper data engineering has collapsed: large administrative datasets (HMDA, Medicare claims, patent filings) are more accessible than the tooling barriers suggest"
  resources:
    - title: "HMDA Data (Consumer Financial Protection Bureau)"
      url: "https://www.consumerfinance.gov/data-research/hmda/"
    - title: "DuckDB: In-process analytical database"
      url: "https://duckdb.org/"
    - title: "IPEDS Database (example project)"
      url: "https://github.com/paulgp/ipeds-database"

