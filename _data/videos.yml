01-setup:
  title: "Getting Started with Claude Code"
  tagline: "Installation, context window, and the habits that keep sessions productive."
  youtube_id: "HzgByl5ZsWE"
  duration: "36:31"
  description: ""
  substack_url: "https://paulgp.substack.com/p/getting-started-with-claude-code"
  takeaways:
    - "Start with a clear subscription choice: Pro ($20/month) for light use, Max ($100/month) for daily coding, since the context window and rate limits determine how far each session goes"
    - "Set up a proper terminal (Ghostty or iTerm2, Zellij for multiplexing, Oh My Zsh) so you can run Claude Code alongside your editor and shell"
    - "Understand the context window: Claude holds roughly 200,000 tokens, auto-compacts when full, and sessions work best within 5 to 10 turns before starting fresh"
    - "Be specific in your prompts and correct early when Claude drifts, rather than letting mistakes compound across turns"
    - "Trust but verify: let Claude write the code, but always check research-critical output yourself"
  resources:
    - title: "Claude Code documentation"
      url: "https://docs.anthropic.com/en/docs/claude-code"
    - title: "Ghostty terminal"
      url: "https://ghostty.org/"
    - title: "Zellij terminal multiplexer"
      url: "https://zellij.dev/"
    - title: "Oh My Zsh"
      url: "https://ohmyz.sh/"

02-data-analysis:
  title: "From an Empty Folder to a Figure"
  tagline: "From a research question to a publication-quality figure in one session."
  youtube_id: "Rp17XUPxa4I"
  duration: "37:30"
  description: ""
  substack_url: "https://paulgp.substack.com/p/from-an-empty-folder-to-a-figure"
  takeaways:
    - "Let Claude handle data acquisition: point it at the source (Census, FRED) and let it navigate the download, rather than spending 20 minutes finding the right table yourself"
    - "Reference style guides you like (such as Kieran Healy’s data visualization work) instead of specifying individual plot parameters one at a time"
    - "Iterate in small steps rather than writing one comprehensive specification; refine the figure incrementally"
    - "Always generate scripts, not just outputs: the code is the reproducible artifact, not the chart"
    - "The judgment is still yours: Claude accelerates implementation, but choosing what to plot and how to interpret it remains your job"
  resources:
    - title: "Kieran Healy, Data Visualization (book)"
      url: "https://socviz.co/"
    - title: "Census Bureau Housing Vacancies Survey"
      url: "https://www.census.gov/housing/hvs/"

03-scraping:
  title: "From EDGAR Filings to a Structured Database"
  tagline: "Front-load context for scraping; let Claude ask you the design questions."
  youtube_id: "wqLZrKdevHs"
  duration: "27:46"
  description: ""
  substack_url: "https://paulgp.substack.com/p/from-edgar-filings-to-a-structured"
  takeaways:
    - "Front-load context for scraping tasks: tell Claude about rate limits, API structure, and expected response formats before it starts writing code"
    - "Let Claude ask you questions about design decisions rather than specifying everything upfront; the interactive back-and-forth produces better architecture"
    - "Build or approve the database schema yourself, and use DuckDB or SQLite for research-scale projects where a full database server is overkill"
    - "Build resume capability into network-dependent pipelines so a dropped connection doesn’t mean starting over"
    - "Add quality reports that run after each stage; they catch parsing failures early (in this case, surfacing that 1 of 120 filings failed)"
    - "Run a real descriptive analysis on the output: if the finding makes sense (tariff mentions rising in the expected years), it validates the whole pipeline"
  resources:
    - title: "SEC EDGAR Full-Text Search"
      url: "https://efts.sec.gov/LATEST/"
    - title: "DuckDB: In-process analytical database"
      url: "https://duckdb.org/"
    - title: "Economic Policy Uncertainty Index"
      url: "https://www.policyuncertainty.com/"

04-large-data:
  title: "Large Datasets and Structured Databases"
  tagline: "Most applied economists are not great at working with big data."
  youtube_id: "4uwI1-9DafU"
  duration: "55:30"
  description: ""
  substack_url: "https://paulgp.substack.com/p/large-datasets-and-structured-databases"
  takeaways:
    - "Use DuckDB and Parquet instead of CSVs and dataframes when data doesn’t fit in RAM, with lazy-loading and fast aggregation"
    - "Build metadata tables as ‘context engineering for data’: store schema, descriptions, and value labels inside the database so it documents itself across sessions"
    - "Use plan mode before writing code, so Claude designs the pipeline architecture and creates a persistent reference rather than jumping into premature edits"
    - "Ask what’s feasible first. Inquire about obstacles and missing information before directing Claude to complete a task"
    - "Deploy parallel sub-agents for research tasks, but verify they inherit your constraints, since they write their own sub-prompts"
    - "The fixed cost of proper data engineering has collapsed: large administrative datasets (HMDA, Medicare claims, patent filings) are more accessible than the tooling barriers suggest"
  resources:
    - title: "HMDA Data (Consumer Financial Protection Bureau)"
      url: "https://www.consumerfinance.gov/data-research/hmda/"
    - title: "DuckDB: In-process analytical database"
      url: "https://duckdb.org/"
    - title: "IPEDS Database (example project)"
      url: "https://github.com/paulgp/ipeds-database"

05-writing:
  title: "Writing and Thinking with AI Assistance"
  tagline: "Writing is thinking: be deliberate about what you offload to the LLM."
  youtube_id: "BxfSiB3Moyo"
  duration: "46:39"
  description: ""
  substack_url: "https://paulgp.substack.com/p/writing-and-thinking-with-ai-assistance"
  takeaways:
    - "Writing is thinking: be deliberate about what you offload versus what you do yourself, and check whether you can discuss the ideas in depth without the LLM"
    - "Build a style guide (a markdown skill file) so the LLM approximates your voice, but expect it to be a useful caricature, not a perfect match"
    - "Start with banal writing: boilerplate, first-pass summaries, and routine documentation are where AI assistance pays off most"
    - "Use the strategic-revision skill to turn referee reports into a dependency-aware revision plan with prioritized execution blocks"
    - "Ask for comments, not rewrites: this keeps you engaged and prevents your prose from drifting toward generic LLM voice"
    - "Think first, then write with AI: iterate your ideas as far as you can before involving the LLM, because specificity is enormously valuable"
  resources:
    - title: "Strategic-revision skill"
      url: "https://github.com/jusi-aalto/strategic-revision"
    - title: "Refine.ink (Ben Golub)"
      url: "https://refine.ink/"
    - title: "Paul’s style guide"
      url: "https://paulgp.com/style_guide.md"

06-skills:
  title: "Skills: Specifying How an Agent Should Think"
  tagline: "A skill is just a markdown file; the leverage comes from standardizing workflows."
  youtube_id: "a03ehomPqMA"
  duration: "31:04"
  description: ""
  substack_url: "https://paulgp.substack.com/p/skills-specifying-how-an-agent-should"
  takeaways:
    - "A skill is just instructions in a markdown file loaded into the context window; the leverage comes from standardizing recurring workflows, not from any new model capability"
    - "Start narrow and opinionated: one repeated problem, one well-specified output structure"
    - "The description field is a trigger, not a title; Claude uses it to decide when the skill applies, so write it for the model, not for humans"
    - "Test on the work you actually do: the theory-vs.-empirical fix in the paper-summary skill only surfaced because it was run on a real paper"
    - "Check what already ships with Claude Code and what’s in the marketplace before building from scratch"
    - "Be careful what you install: skills fill the context window, and third-party skills are someone else’s instructions running in your environment"
  resources:
    - title: "Claude Code skills documentation"
      url: "https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview"
    - title: "Superpowers skill collection (Jesse Vincent)"
      url: "https://github.com/obra/superpowers"
    - title: "Anthropic skills repository"
      url: "https://github.com/anthropics/skills"

07-permissions:
  title: "Permissions, Sandboxes, and Autonomous Agents"
  tagline: "The real lever is the environment, not the approval mode."
  youtube_id: "8Jnx5rL_Gfk"
  duration: "47:47"
  description: ""
  substack_url: "https://paulgp.substack.com/p/permissions-sandboxes-and-autonomous"
  takeaways:
    - "Permissions come in two forms (folder access and tool access), and both need to be reasoned about separately"
    - "Auto and YOLO approval modes can be sensible if you prepare the environment first; reflexive ‘yes’ clicks are not real safety"
    - "The real lever is the environment: mount only what you need, drop capabilities, use --network=none once setup is done"
    - "Data governance is separate from sandboxing; for genuinely sensitive material, a local model may be the right answer rather than a remote one"
    - "Sandboxing opens up the long-running-agent workflow: once the boundary is right, persistent agents become tractable"
    - "Treat an agent with tools like a research assistant: you would not give an RA a task where they can break everything, and the sandbox is how you enforce that"
  resources:
    - title: "claude-container (Paul’s Docker setup)"
      url: "https://github.com/paulgp/claude-container"
    - title: "agent-safehouse"
      url: "https://agent-safehouse.dev/"
    - title: "OpenClaw"
      url: "https://openclaw.ai/"

08-workflow-git:
  title: "Integration and Collaboration in AI Research Work"
  tagline: "AI makes producing code cheap; verifying it is the expensive part."
  youtube_id: "EcloxLPcRsY"
  duration: "65:14"
  description: ""
  substack_url: "https://paulgp.substack.com/p/integration-and-collaboration-in"
  takeaways:
    - "Ask for the audit trail before the work happens: commit messages, issue references, and documentation should be part of the workflow, not an afterthought"
    - "Review commits, not full codebases; the unit of verification is a bounded diff, not thousands of lines"
    - "Treat documentation as a map, not a verdict: LLMs will claim results are done that are not, so verify and consider having another AI review"
    - "Route feedback through GitHub issues to keep the paper trail useful for both humans and agents"
    - "No hand-typed numbers: code emits results, the draft ingests them, and git connects the two; review the method before you wire it in"
  resources:
    - title: "ipo-bump project repo"
      url: "https://github.com/paulgp/ipo-bump"
    - title: "Jay Ritter’s IPO data"
      url: "https://site.warrington.ufl.edu/ritter/ipo-data/"
