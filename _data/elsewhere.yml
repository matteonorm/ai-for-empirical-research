# External ecosystem: other people’s AI-for-research resources.
# NOT Paul's own content (that's the pipeline).

guides:
  label: "Guides and writing"
  items:
    - title: "Generative AI for Economic Research"
      url: "https://www.genaiforecon.org/"
      author: "Anton Korinek"
      description: "Companion site to Korinek’s JEL survey on LLMs in economics. Covers ideation, writing, coding, data analysis, and math; updated roughly every six months."
    - title: "Causal Inference Substack"
      url: "https://causalinf.substack.com"
      author: "Scott Cunningham"
      description: "Newsletter on causal inference and econometrics, increasingly focused on how AI agents change the research workflow. Mixes tutorials with applied examples."
    - title: "AI Econ Wiki"
      url: "https://velikov-mihail.github.io/ai-econ-wiki/"
      author: "Mihail Velikov"
      description: "Curated knowledge base on AI tools for business and economics research, compiled from 176+ articles and papers."

workflows:
  label: "Workflow systems"
  items:
    - title: "Claude Blattman · AI for Professionals Who Don’t Code"
      url: "https://claudeblattman.com"
      author: "Chris Blattman"
      description: "Open-source Claude Code setup for non-programmers: project management, inbox and meeting workflows, and downloadable skills."
    - title: "Claude Code My Workflow"
      url: "https://psantanna.com/claude-code-my-workflow/"
      author: "Pedro Sant’Anna"
      description: "A fork-able Claude Code system for academic work across papers, slides, data analysis, and replication packages, with specialized review agents and quality gates."

video:
  label: "Video series"
  items:
    - title: "Markus’ Academy"
      url: "https://bcf.princeton.edu/markus-academy/"
      author: "Princeton Bendheim Center"
      description: "Weekly webinar series hosted by Markus Brunnermeier at Princeton, with talks on finance, macro, and (increasingly) AI in economics."
      sessions:
        - title: "A User’s Guide to GPT and LLMs for Economics Research"
          url: "https://bcf.princeton.edu/events/kevin-bryan-on-a-users-guide-to-gpt-and-llms-for-economics-research/"
          speaker: "Kevin Bryan"
          description: "Practical walkthrough of using LLMs in economics: basics, main research use cases, controlling output, and implementation fixes."
        - title: "Modern AI for Economics Research: An Overview of Tools"
          url: "https://bcf.princeton.edu/events/benjamin-golub-on-modern-ai-for-economics-research-an-overview-of-tools/"
          speaker: "Benjamin Golub"
          description: "Tutorial covering Cursor (AI-native code editing), Refine.ink (automated referee-style feedback on papers), and prompting best practices."
        - title: "Unlocking Economic Data with LLMs"
          url: "https://bcf.princeton.edu/events/sergio-correia-on-unlocking-economic-data-with-llms/"
          speaker: "Sergio Correia"
          description: "How to summarize text, extract historical data, and merge datasets with a few lines of Python, plus embeddings and RAG pipeline design."
        - title: "Introducing AI Agents"
          url: "https://bcf.princeton.edu/events/eduard-talamas-on-introducing-ai-agents/"
          speaker: "Eduard Talamas"
          description: "AI as scalable knowledge in organizations: how the degree of agent autonomy determines who gains and who loses from adoption."
